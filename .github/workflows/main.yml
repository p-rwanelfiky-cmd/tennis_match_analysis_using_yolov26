name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --collect-all ultralytics --add-data "yolo26n.pt;." main-gui-tennis.py
      # The ';' is critical for Windows data paths inside PyInstaller

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Tennis-Analytics-Windows-App
        path: dist/*.exe
